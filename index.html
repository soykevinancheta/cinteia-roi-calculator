<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ROI Calculator - Cinteia</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-900 to-black text-white min-h-screen flex items-center justify-center p-6">

  <div class="w-full max-w-lg">

    <!-- HEADER -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold mb-2">
        ROI Calculator
      </h1>
      <p class="text-gray-400">
        Descubre si tu inversión realmente está generando ganancias 📈
      </p>
    </div>

    <!-- CARD -->
    <div class="bg-gray-800/80 backdrop-blur p-8 rounded-2xl shadow-2xl border border-gray-700">

      <!-- INPUT -->
      <div class="mb-5">
        <label class="block mb-2 text-sm text-gray-300">Inversión ($)</label>
        <input id="investment" type="number"
          class="w-full p-3 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-white">
      </div>

      <div class="mb-6">
        <label class="block mb-2 text-sm text-gray-300">Ganancia ($)</label>
        <input id="profit" type="number"
          class="w-full p-3 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-white">
      </div>

      <!-- BOTÓN -->
      <button onclick="calculateROI()"
        class="w-full bg-white text-black p-3 rounded-xl font-semibold hover:bg-gray-300 transition transform hover:scale-105">
        Calcular ROI
      </button>

      <!-- RESULTADO -->
      <div id="result" class="mt-6 text-sm text-gray-200 leading-relaxed"></div>

    </div>

    <!-- FOOTER -->
    <div class="text-center mt-6 text-sm text-gray-500">
      <a href="/tools/" class="hover:text-white transition">
        ← Volver a herramientas
      </a>
    </div>

  </div>

  <script>
    function calculateROI() {
      const investment = parseFloat(document.getElementById("investment").value);
      const profit = parseFloat(document.getElementById("profit").value);

      if (!investment || !profit) {
        document.getElementById("result").innerHTML = "⚠️ Ingresa valores válidos";
        return;
      }

      const roi = ((profit - investment) / investment) * 100;

      let message = "";

      if (roi > 50) {
        message = "🔥 <strong>Excelente rendimiento</strong>. Tu inversión está generando grandes ganancias.";
      } else if (roi > 0) {
        message = "⚡ <strong>Estás ganando dinero</strong>, pero podrías optimizar tus resultados.";
      } else {
        message = "❌ <strong>Estás perdiendo dinero</strong>. Es momento de ajustar tu estrategia.";
      }

      message += `<br><br>📊 ROI: <strong>${roi.toFixed(2)}%</strong>`;
      message += "<br><br><span class='text-white font-semibold'>👉 Si quieres mejorar tus resultados, contáctame en Cinteia.</span>";

      document.getElementById("result").innerHTML = message;
    }
  </script>

</body>
</html>
