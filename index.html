<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ROI Calculator - Cinteia</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

  <div class="bg-white p-8 rounded-2xl shadow-lg w-96">
    <h1 class="text-2xl font-bold mb-4 text-center">ROI Calculator</h1>

    <label class="block mb-2">Inversión ($)</label>
    <input id="investment" type="number" class="w-full p-2 border rounded mb-4">

    <label class="block mb-2">Ganancia ($)</label>
    <input id="profit" type="number" class="w-full p-2 border rounded mb-4">

    <button onclick="calculateROI()" class="w-full bg-black text-white p-2 rounded hover:bg-gray-800">
      Calcular
    </button>

    <div id="result" class="mt-4 text-center text-xl font-semibold"></div>
  </div>

  <script>
    function calculateROI() {
      const investment = parseFloat(document.getElementById("investment").value);
      const profit = parseFloat(document.getElementById("profit").value);

      if (!investment || !profit) {
        document.getElementById("result").innerText = "Ingresá valores válidos";
        return;
      }

      const roi = ((profit - investment) / investment) * 100;

      document.getElementById("result").innerText = "ROI: " + roi.toFixed(2) + "%";
    }
  </script>

</body>
</html>
